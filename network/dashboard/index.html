<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetWork — AI Networking Brain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
        .card-hot { border-left: 4px solid #ef4444; }
        .card-warm { border-left: 4px solid #f59e0b; }
        .card-cold { border-left: 4px solid #3b82f6; }
        .badge-hot { background: #ef4444; }
        .badge-warm { background: #f59e0b; }
        .badge-cold { background: #3b82f6; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [contacts, setContacts] = useState([]);
            const [stats, setStats] = useState({});
            const [search, setSearch] = useState("");
            const [loading, setLoading] = useState(true);

            const fetchData = async () => {
                try {
                    const [contactsRes, statsRes] = await Promise.all([
                        fetch("/api/contacts"),
                        fetch("/api/stats"),
                    ]);
                    setContacts(await contactsRes.json());
                    setStats(await statsRes.json());
                } catch (e) {
                    console.error("Fetch error:", e);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 30000);
                return () => clearInterval(interval);
            }, []);

            const filtered = search
                ? contacts.filter(c =>
                    JSON.stringify(c).toLowerCase().includes(search.toLowerCase())
                )
                : contacts;

            return (
                <div className="min-h-screen p-6 max-w-7xl mx-auto">
                    {/* Header */}
                    <div className="mb-8">
                        <h1 className="text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                            NetWork
                        </h1>
                        <p className="text-slate-400 mt-1">AI Networking Brain — Live Dashboard</p>
                    </div>

                    {/* Stats Bar */}
                    <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                        <StatCard label="Total Contacts" value={stats.total || 0} color="text-white" />
                        <StatCard label="Hot Leads" value={stats.hot || 0} color="text-red-400" />
                        <StatCard label="Warm" value={stats.warm || 0} color="text-amber-400" />
                        <StatCard label="Cold" value={stats.cold || 0} color="text-blue-400" />
                        <StatCard label="Pending Follow-ups" value={stats.pending_followups || 0} color="text-purple-400" />
                    </div>

                    {/* Search */}
                    <div className="mb-6">
                        <input
                            type="text"
                            placeholder="Search contacts by name, company, venue, tags..."
                            value={search}
                            onChange={e => setSearch(e.target.value)}
                            className="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500"
                        />
                    </div>

                    {/* Loading */}
                    {loading && (
                        <div className="text-center py-12 text-slate-400 pulse">
                            Loading contacts from vault...
                        </div>
                    )}

                    {/* Contact Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {filtered.map(contact => (
                            <ContactCard key={contact.id || contact.email} contact={contact} />
                        ))}
                    </div>

                    {!loading && filtered.length === 0 && (
                        <div className="text-center py-12 text-slate-500">
                            {search ? "No contacts match your search." : "No contacts yet. Start networking!"}
                        </div>
                    )}

                    {/* Footer */}
                    <div className="mt-12 text-center text-slate-600 text-sm">
                        Auto-refreshes every 30s &middot; Powered by Inkbox + OpenAI
                    </div>
                </div>
            );
        }

        function StatCard({ label, value, color }) {
            return (
                <div className="bg-slate-800/50 rounded-lg p-4 border border-slate-700">
                    <div className={`text-3xl font-bold ${color}`}>{value}</div>
                    <div className="text-slate-400 text-sm mt-1">{label}</div>
                </div>
            );
        }

        function ContactCard({ contact }) {
            const warmth = contact.warmth_score || "warm";
            const cardClass = `card-${warmth}`;
            const badgeClass = `badge-${warmth}`;
            const history = contact.outreach_history || [];

            return (
                <div className={`bg-slate-800/80 rounded-lg p-5 border border-slate-700 ${cardClass}`}>
                    {/* Header */}
                    <div className="flex justify-between items-start mb-3">
                        <div>
                            <h3 className="text-lg font-semibold text-white">{contact.name}</h3>
                            <p className="text-slate-400 text-sm">
                                {contact.role && `${contact.role} · `}{contact.company}
                            </p>
                        </div>
                        <span className={`${badgeClass} text-white text-xs px-2 py-1 rounded-full uppercase font-bold`}>
                            {warmth}
                        </span>
                    </div>

                    {/* Details */}
                    <div className="space-y-1 text-sm text-slate-400 mb-3">
                        {contact.email && <div>📧 {contact.email}</div>}
                        {contact.venue && <div>📍 {contact.venue}</div>}
                        {contact.date_met && <div>📅 Met: {contact.date_met}</div>}
                        {contact.source && <div>🔗 Source: {contact.source}</div>}
                    </div>

                    {/* Context */}
                    {contact.context_notes && (
                        <div className="text-sm text-slate-300 bg-slate-900/50 rounded p-2 mb-3">
                            {contact.context_notes}
                        </div>
                    )}

                    {/* Tags */}
                    {contact.tags && contact.tags.length > 0 && (
                        <div className="flex flex-wrap gap-1 mb-3">
                            {contact.tags.slice(0, 5).map((tag, i) => (
                                <span key={i} className="bg-slate-700 text-slate-300 text-xs px-2 py-0.5 rounded">
                                    {tag}
                                </span>
                            ))}
                        </div>
                    )}

                    {/* Outreach Timeline */}
                    {history.length > 0 && (
                        <div className="border-t border-slate-700 pt-3 mt-3">
                            <div className="text-xs text-slate-500 uppercase mb-2">Outreach History</div>
                            {history.slice(-3).map((event, i) => (
                                <div key={i} className="flex items-center gap-2 text-xs text-slate-400 mb-1">
                                    <span className={event.reply_received ? "text-green-400" : "text-slate-600"}>●</span>
                                    <span>{event.date}</span>
                                    <span className="text-slate-600">|</span>
                                    <span>{event.type}</span>
                                    <span className="text-slate-600">|</span>
                                    <span className="truncate">{event.subject}</span>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Follow-up */}
                    {contact.next_follow_up && (
                        <div className="text-xs text-purple-400 mt-2">
                            Next follow-up: {contact.next_follow_up} ({contact.follow_up_count}/{contact.max_follow_ups})
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
