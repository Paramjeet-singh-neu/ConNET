<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetWork — AI Networking Brain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
        .card-hot { border-left: 4px solid #ef4444; }
        .card-warm { border-left: 4px solid #f59e0b; }
        .card-cold { border-left: 4px solid #3b82f6; }
        .badge-hot { background: #ef4444; }
        .badge-warm { background: #f59e0b; }
        .badge-cold { background: #3b82f6; }
        .badge-self { background: #a855f7; }
        .tab-active { border-bottom: 2px solid #818cf8; color: #818cf8; }
        .tab-inactive { border-bottom: 2px solid transparent; color: #64748b; }
        .feed-enter { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .pulse-dot { animation: pulseDot 2s infinite; }
        @keyframes pulseDot { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.4)} 50%{box-shadow:0 0 0 8px rgba(34,197,94,0)} }
        #graph-container svg { width: 100%; height: 600px; }
        .graph-node text { font-size: 11px; fill: #e2e8f0; pointer-events: none; }
        .graph-link { stroke-opacity: 0.4; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        function App() {
            const [tab, setTab] = useState("feed");
            const [contacts, setContacts] = useState([]);
            const [stats, setStats] = useState({});
            const [graph, setGraph] = useState({ nodes: [], edges: [] });
            const [events, setEvents] = useState([]);
            const [search, setSearch] = useState("");

            const fetchData = async () => {
                try {
                    const [cRes, sRes, gRes, fRes] = await Promise.all([
                        fetch("/api/contacts"), fetch("/api/stats"),
                        fetch("/api/graph"), fetch("/api/feed?n=50"),
                    ]);
                    setContacts(await cRes.json());
                    setStats(await sRes.json());
                    setGraph(await gRes.json());
                    setEvents(await fRes.json());
                } catch (e) { console.error(e); }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 15000);

                // SSE for live events
                const es = new EventSource("/api/feed/stream");
                es.onmessage = (e) => {
                    const event = JSON.parse(e.data);
                    setEvents(prev => [event, ...prev].slice(0, 50));
                };
                return () => { clearInterval(interval); es.close(); };
            }, []);

            const filtered = search
                ? contacts.filter(c => JSON.stringify(c).toLowerCase().includes(search.toLowerCase()))
                : contacts;

            return (
                <div className="min-h-screen p-6 max-w-7xl mx-auto">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-6">
                        <div>
                            <h1 className="text-4xl font-bold bg-gradient-to-r from-blue-400 via-purple-500 to-pink-500 bg-clip-text text-transparent">
                                NetWork
                            </h1>
                            <p className="text-slate-400 mt-1">AI Networking Brain — Live Dashboard</p>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className="w-2.5 h-2.5 rounded-full bg-green-500 pulse-dot"></div>
                            <span className="text-green-400 text-sm font-medium">LIVE</span>
                        </div>
                    </div>

                    {/* Stats Bar */}
                    <div className="grid grid-cols-2 md:grid-cols-6 gap-3 mb-6">
                        <StatCard label="Contacts" value={stats.total || 0} color="text-white" />
                        <StatCard label="Hot" value={stats.hot || 0} color="text-red-400" />
                        <StatCard label="Warm" value={stats.warm || 0} color="text-amber-400" />
                        <StatCard label="Cold" value={stats.cold || 0} color="text-blue-400" />
                        <StatCard label="Follow-ups" value={stats.pending_followups || 0} color="text-purple-400" />
                        <StatCard label="Events" value={events.length} color="text-green-400" />
                    </div>

                    {/* Tabs */}
                    <div className="flex gap-6 mb-6 border-b border-slate-700">
                        {["feed", "graph", "contacts"].map(t => (
                            <button key={t} onClick={() => setTab(t)}
                                className={`pb-3 px-1 text-sm font-medium uppercase tracking-wider transition ${tab === t ? "tab-active" : "tab-inactive hover:text-slate-300"}`}>
                                {t === "feed" ? "Live Feed" : t === "graph" ? "Network Graph" : "Contacts"}
                            </button>
                        ))}
                    </div>

                    {/* Tab Content */}
                    {tab === "feed" && <LiveFeedView events={events} />}
                    {tab === "graph" && <NetworkGraph data={graph} />}
                    {tab === "contacts" && (
                        <>
                            <div className="mb-4">
                                <input type="text" placeholder="Search contacts..." value={search}
                                    onChange={e => setSearch(e.target.value)}
                                    className="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500" />
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {filtered.map(c => <ContactCard key={c.id || c.email} contact={c} />)}
                            </div>
                            {filtered.length === 0 && <div className="text-center py-12 text-slate-500">No contacts found.</div>}
                        </>
                    )}

                    <div className="mt-12 text-center text-slate-600 text-sm">
                        Powered by Inkbox + OpenAI &middot; Built for Hack-a-Sprint 2026
                    </div>
                </div>
            );
        }

        /* ═══════════ LIVE FEED ═══════════ */
        function LiveFeedView({ events }) {
            if (events.length === 0) {
                return (
                    <div className="text-center py-16">
                        <div className="text-4xl mb-4">📡</div>
                        <div className="text-slate-400">Waiting for agent activity...</div>
                        <div className="text-slate-600 text-sm mt-2">Events will appear here in real time as the agent processes emails, sends outreach, and more.</div>
                    </div>
                );
            }
            return (
                <div className="space-y-2">
                    {events.map((e, i) => (
                        <div key={e.id ?? i} className="feed-enter flex items-start gap-3 bg-slate-800/60 rounded-lg p-4 border border-slate-700/50">
                            <div className="text-2xl mt-0.5">{e.data?.icon || "📌"}</div>
                            <div className="flex-1 min-w-0">
                                <div className="flex items-center gap-2">
                                    <span className="font-medium text-white">{e.data?.title}</span>
                                    <span className="text-xs text-slate-500">{formatTime(e.timestamp)}</span>
                                </div>
                                <div className="text-sm text-slate-400 mt-0.5">{e.data?.detail}</div>
                                {e.data?.meta && <div className="text-xs text-slate-500 mt-1 italic">{e.data.meta}</div>}
                            </div>
                            <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${typeColor(e.type)}`}>
                                {e.type}
                            </span>
                        </div>
                    ))}
                </div>
            );
        }

        function formatTime(ts) {
            if (!ts) return "";
            const d = new Date(ts + "Z");
            return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        }

        function typeColor(type) {
            const m = {
                outbound: "bg-blue-500/20 text-blue-400",
                inbound: "bg-green-500/20 text-green-400",
                reply: "bg-emerald-500/20 text-emerald-400",
                sentiment: "bg-amber-500/20 text-amber-400",
                followup: "bg-purple-500/20 text-purple-400",
                agent_comms: "bg-pink-500/20 text-pink-400",
                briefing: "bg-cyan-500/20 text-cyan-400",
                vault: "bg-slate-500/20 text-slate-400",
                intro: "bg-rose-500/20 text-rose-400",
            };
            return m[type] || "bg-slate-500/20 text-slate-400";
        }

        /* ═══════════ NETWORK GRAPH ═══════════ */
        function NetworkGraph({ data }) {
            const svgRef = useRef(null);
            const containerRef = useRef(null);

            useEffect(() => {
                if (!data.nodes.length || !svgRef.current) return;
                const svg = d3.select(svgRef.current);
                svg.selectAll("*").remove();

                const width = containerRef.current.clientWidth;
                const height = 600;
                svg.attr("viewBox", `0 0 ${width} ${height}`);

                const warmthColor = { self: "#a855f7", hot: "#ef4444", warm: "#f59e0b", cold: "#3b82f6" };
                const sourceColor = { outbound: "#3b82f6", inbound: "#22c55e", agent: "#ec4899", company: "#64748b", venue: "#64748b" };

                const simulation = d3.forceSimulation(data.nodes)
                    .force("link", d3.forceLink(data.edges).id(d => d.id).distance(120))
                    .force("charge", d3.forceManyBody().strength(-300))
                    .force("center", d3.forceCenter(width / 2, height / 2))
                    .force("collision", d3.forceCollide().radius(40));

                // Edges
                const link = svg.append("g").selectAll("line")
                    .data(data.edges).enter().append("line")
                    .attr("class", "graph-link")
                    .attr("stroke", d => sourceColor[d.type] || "#475569")
                    .attr("stroke-width", d => d.type === "company" || d.type === "venue" ? 1 : 2);

                // Nodes
                const node = svg.append("g").selectAll("g")
                    .data(data.nodes).enter().append("g")
                    .attr("class", "graph-node")
                    .call(d3.drag()
                        .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                        .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
                        .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
                    );

                node.append("circle")
                    .attr("r", d => d.group === "self" ? 22 : 14)
                    .attr("fill", d => warmthColor[d.warmth] || "#64748b")
                    .attr("stroke", "#1e293b")
                    .attr("stroke-width", 2)
                    .style("filter", d => d.warmth === "hot" ? "drop-shadow(0 0 6px #ef4444)" : "none");

                node.append("text")
                    .attr("dy", d => d.group === "self" ? 36 : 28)
                    .attr("text-anchor", "middle")
                    .attr("font-weight", d => d.group === "self" ? "bold" : "normal")
                    .text(d => d.name);

                // Company labels
                node.filter(d => d.company).append("text")
                    .attr("dy", d => d.group === "self" ? 50 : 40)
                    .attr("text-anchor", "middle")
                    .attr("font-size", "9px")
                    .attr("fill", "#64748b")
                    .text(d => d.company);

                simulation.on("tick", () => {
                    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                    node.attr("transform", d => `translate(${d.x},${d.y})`);
                });

            }, [data]);

            return (
                <div ref={containerRef} className="bg-slate-800/40 rounded-xl border border-slate-700 p-4">
                    <div className="flex items-center gap-4 mb-4 text-xs text-slate-400">
                        <span><span className="inline-block w-3 h-3 rounded-full bg-purple-500 mr-1"></span>You</span>
                        <span><span className="inline-block w-3 h-3 rounded-full bg-red-500 mr-1"></span>Hot</span>
                        <span><span className="inline-block w-3 h-3 rounded-full bg-amber-500 mr-1"></span>Warm</span>
                        <span><span className="inline-block w-3 h-3 rounded-full bg-blue-500 mr-1"></span>Cold</span>
                        <span className="ml-auto">Drag nodes to rearrange</span>
                    </div>
                    <svg ref={svgRef}></svg>
                </div>
            );
        }

        /* ═══════════ CONTACT CARD ═══════════ */
        function StatCard({ label, value, color }) {
            return (
                <div className="bg-slate-800/50 rounded-lg p-3 border border-slate-700">
                    <div className={`text-2xl font-bold ${color}`}>{value}</div>
                    <div className="text-slate-400 text-xs mt-1">{label}</div>
                </div>
            );
        }

        function ContactCard({ contact }) {
            const warmth = contact.warmth_score || "warm";
            const history = contact.outreach_history || [];
            return (
                <div className={`bg-slate-800/80 rounded-lg p-5 border border-slate-700 card-${warmth}`}>
                    <div className="flex justify-between items-start mb-3">
                        <div>
                            <h3 className="text-lg font-semibold text-white">{contact.name}</h3>
                            <p className="text-slate-400 text-sm">{contact.role && `${contact.role} · `}{contact.company}</p>
                        </div>
                        <span className={`badge-${warmth} text-white text-xs px-2 py-1 rounded-full uppercase font-bold`}>{warmth}</span>
                    </div>
                    <div className="space-y-1 text-sm text-slate-400 mb-3">
                        {contact.email && <div>📧 {contact.email}</div>}
                        {contact.venue && <div>📍 {contact.venue}</div>}
                        {contact.date_met && <div>📅 Met: {contact.date_met}</div>}
                        <div>🔗 Source: {contact.source}</div>
                    </div>
                    {contact.context_notes && (
                        <div className="text-sm text-slate-300 bg-slate-900/50 rounded p-2 mb-3">{contact.context_notes}</div>
                    )}
                    {contact.tags?.length > 0 && (
                        <div className="flex flex-wrap gap-1 mb-3">
                            {contact.tags.slice(0, 5).map((tag, i) => (
                                <span key={i} className="bg-slate-700 text-slate-300 text-xs px-2 py-0.5 rounded">{tag}</span>
                            ))}
                        </div>
                    )}
                    {history.length > 0 && (
                        <div className="border-t border-slate-700 pt-3 mt-3">
                            <div className="text-xs text-slate-500 uppercase mb-2">History</div>
                            {history.slice(-3).map((ev, i) => (
                                <div key={i} className="flex items-center gap-2 text-xs text-slate-400 mb-1">
                                    <span className={ev.reply_received ? "text-green-400" : "text-slate-600"}>●</span>
                                    <span>{ev.date}</span><span className="text-slate-600">|</span>
                                    <span>{ev.type}</span><span className="text-slate-600">|</span>
                                    <span className="truncate">{ev.subject}</span>
                                </div>
                            ))}
                        </div>
                    )}
                    {contact.next_follow_up && (
                        <div className="text-xs text-purple-400 mt-2">Next follow-up: {contact.next_follow_up} ({contact.follow_up_count}/{contact.max_follow_ups})</div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
